<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Ops</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel game-panel">
        <h1>Snake Ops</h1>
        <p class="subtitle">Browser snake game with backend leaderboard</p>

        <div class="hud">
          <div>Score: <span id="score">0</span></div>
          <div>Status: <span id="status">Ready</span></div>
        </div>

        <canvas id="game" width="400" height="400" aria-label="Snake game area"></canvas>

        <div class="controls">
          <button id="start-btn" type="button">Start Game</button>
          <button id="reset-btn" type="button">Reset</button>
        </div>

        <p class="hint">Use arrow keys or WASD to move.</p>
      </section>

      <section class="panel side-panel">
        <h2>Player</h2>
        <form id="auth-form">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" minlength="3" maxlength="32" required />

          <label for="password">Password</label>
          <input id="password" name="password" type="password" minlength="6" required />

          <div class="actions">
            <button id="register-btn" type="button">Register</button>
            <button id="login-btn" type="button">Login</button>
          </div>
        </form>

        <div class="session" id="session">Not logged in</div>

        <h2>Leaderboard</h2>
        <button id="refresh-board-btn" type="button">Refresh</button>
        <ol id="leaderboard"></ol>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
