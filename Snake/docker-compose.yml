services:
  mysql:
    image: mysql:8.4
    container_name: snake-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: snake
      MYSQL_USER: snake_user
      MYSQL_PASSWORD: snake_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 8
    networks:
      - snake-net

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: snake-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: snake
      DB_USER: snake_user
      DB_PASSWORD: snake_password
      APP_JWT_SECRET: local-dev-jwt-secret
      CORS_ALLOW_ORIGIN: "*"
    ports:
      - "8081:80"
    networks:
      - snake-net

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: snake-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - snake-net

volumes:
  mysql_data:

networks:
  snake-net:
    driver: bridge
