apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: snake
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/snake.git
    targetRevision: main
    path: helm/snake-stack
    helm:
      releaseName: snake
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: snake
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
