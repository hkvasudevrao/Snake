apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "snake-stack.fullname" . }}-frontend
  labels:
    {{- include "snake-stack.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
