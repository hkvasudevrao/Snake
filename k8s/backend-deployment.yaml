apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: snake
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      containers:
        - name: backend
          image: ghcr.io/hkvasudevrao/snake-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: snake-config
                  key: db-host
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: snake-config
                  key: db-port
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: snake-config
                  key: db-name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: snake-secrets
                  key: mysql-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: snake-secrets
                  key: mysql-password
            - name: APP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: snake-secrets
                  key: app-jwt-secret
            - name: CORS_ALLOW_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: snake-config
                  key: cors-origin
          livenessProbe:
            httpGet:
              path: /healthz.php
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz.php
              port: http
            initialDelaySeconds: 8
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
