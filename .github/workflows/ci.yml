name: snake-ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: PHP syntax check
        run: |
          set -euo pipefail
          for f in backend/*.php; do
            php -l "$f"
          done

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: JavaScript syntax check
        run: node --check frontend/game.js

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        run: terraform -chdir=terraform fmt -check -recursive

  build-and-push:
    if: github.event_name == 'push'
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image_name: frontend
            dockerfile: docker/frontend.Dockerfile
          - image_name: backend
            dockerfile: docker/backend.Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/snake-${{ matrix.image_name }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/snake-${{ matrix.image_name }}:latest
